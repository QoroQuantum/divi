name: Build Docs

on:
  push:
    branches: ["**"]
    paths:
      - "docs/**"
      - "divi/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install doc dependencies
        run: uv sync --no-default-groups --group docs --no-install-project

      - name: Build Sphinx HTML
        run: |
          cd docs
          uv run make build SPHINXOPTS="-W"
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
