name: Build Docs

on:
  push:
    branches: ["**"]
    paths:
      - "docs/**"
      - "divi/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --no-default-groups --group docs --group testing

      - name: Test documentation code snippets
        run: |
          cd docs
          make test-snippets
        env:
          MPLBACKEND: Agg

      - name: Build Sphinx HTML
        # ``nitpicky = True`` is set in docs/source/conf.py; ``-W`` turns every
        # nitpick warning into a build failure.
        run: |
          cd docs
          uv run make build SPHINXOPTS="-W"
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
