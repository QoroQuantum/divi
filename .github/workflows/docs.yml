name: Build & Deploy Docs to Pages

on:
  push:
    branches: ["**"]
    paths:
      - "docs/**"
      - "divi/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry==2.2.1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'poetry'

      - name: Install doc dependencies (Poetry)
        run: |
          poetry install --with docs --no-root --no-interaction

      - name: Build Sphinx HTML
        run: |
          cd docs
          make build SPHINXOPTS="-W"
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy-docs:
    if: github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
