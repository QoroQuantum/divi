name: Build Docs

on:
  push:
    branches: ["**"]
    paths:
      - "docs/**"
      - "divi/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry==2.2.1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'poetry'

      - name: Install doc dependencies (Poetry)
        run: |
          poetry install --with docs --no-root --no-interaction

      - name: Build Sphinx HTML
        run: |
          cd docs
          poetry run make build SPHINXOPTS="-W"
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
