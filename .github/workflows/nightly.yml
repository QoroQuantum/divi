name: Nightly Build

on:
  schedule:
    - cron: "0 0 * * *" # midnight UTC
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has-new-commits: ${{ steps.commit-check.outputs.has-new-commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits in the last 24 hours
        id: commit-check
        run: |
          if git log --since="24 hours ago" --oneline | grep -q .; then
            echo "has-new-commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-new-commits=false" >> "$GITHUB_OUTPUT"
          fi

  nightly:
    needs: check
    if: needs.check.outputs.has-new-commits == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry==2.2.1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --only=main,ai --no-interaction --no-ansi

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-jina-v2-base-code

      - name: Build divi-ai search index
        run: poetry run python -m divi.ai build

      - name: Set nightly version
        run: |
          BASE_VERSION=$(poetry version -s)
          # Bump minor so nightly sorts AFTER the current stable release on PyPI
          # e.g. 0.9.0 -> 0.10.0.dev20260328 (which is > 0.9.0 and > 0.9.x per PEP 440)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          NEXT_MINOR="$MAJOR.$((MINOR + 1)).0"
          NIGHTLY_VERSION="${NEXT_MINOR}.dev$(date -u +%Y%m%d)"
          poetry version "$NIGHTLY_VERSION"
          echo "NIGHTLY_VERSION=$NIGHTLY_VERSION" >> "$GITHUB_ENV"

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
