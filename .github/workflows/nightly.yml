name: Nightly Build

on:
  schedule:
    - cron: "0 0 * * *" # midnight UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has-new-commits: ${{ steps.commit-check.outputs.has-new-commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits in the last 24 hours
        id: commit-check
        run: |
          if git log --since="24 hours ago" --oneline | grep -q .; then
            echo "has-new-commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-new-commits=false" >> "$GITHUB_OUTPUT"
          fi

  nightly:
    needs: check
    if: needs.check.outputs.has-new-commits == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --only=main --no-interaction --no-ansi

      - name: Set nightly version
        run: |
          BASE_VERSION=$(poetry version -s)
          NIGHTLY_VERSION="${BASE_VERSION}.dev$(date -u +%Y%m%d)"
          poetry version "$NIGHTLY_VERSION"
          echo "NIGHTLY_VERSION=$NIGHTLY_VERSION" >> "$GITHUB_ENV"

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          poetry config pypi-token.pypi $PYPI_API_TOKEN
          poetry publish
