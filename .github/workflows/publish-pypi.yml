name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry==2.2.1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --only=main,ai --no-interaction --no-ansi

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-jina-v2-base-code

      - name: Build divi-ai search index
        run: poetry run python -m divi.ai build

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
