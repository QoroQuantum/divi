name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --no-default-groups --group ai

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-jina-v2-base-code

      - name: Build divi-ai search index
        run: uv run python -m divi.ai build --batch-size 8

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
