name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-divi
        with:
          python-version: "3.11"
          sync-args: --extra ai

      - uses: ./.github/actions/build-ai-index
        with:
          hf-token: ${{ secrets.HF_TOKEN }}

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
