name: Unit Tests and Tutorial Scripts

on: [push, workflow_dispatch]

permissions:
  contents: read

jobs:
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --no-default-groups --group testing

      - name: Run unit tests
        run: uv run pytest -n auto -m "not requires_api_key"

      - name: Run API tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: uv run pytest --run-api-tests -m "requires_api_key"
        env:
          QORO_API_KEY: ${{ secrets.QORO_API_KEY }}
          LOCKED_ACCOUNT_KEY: ${{ secrets.LOCKED_ACCOUNT_KEY }}

  tutorials:
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --no-default-groups --group testing

      - name: Run tutorial scripts
        shell: bash
        run: ./.github/workflows/run_tutorials.sh
