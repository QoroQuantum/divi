name: Wheel Build (dry-run)

on: workflow_dispatch

permissions:
  contents: read

jobs:
  wheel-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --no-default-groups --group ai

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-jina-v2-base-code

      - name: Build divi-ai search index
        run: uv run python -m divi.ai build --batch-size 8

      - name: Build wheel
        run: uv build

      - name: Verify index in wheel
        run: |
          zipinfo dist/*.whl | grep divi/ai/_data/vectors.faiss
          zipinfo dist/*.whl | grep divi/ai/_data/chunks.json
          zipinfo dist/*.whl | grep divi/ai/_data/project_meta.json
