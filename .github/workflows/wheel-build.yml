name: Wheel Build (dry-run)

on: workflow_dispatch

permissions:
  contents: read

jobs:
  wheel-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-divi
        with:
          python-version: "3.11"
          sync-args: --extra ai

      - uses: ./.github/actions/build-ai-index

      - name: Build wheel
        run: uv build

      - name: Verify index in wheel
        run: |
          zipinfo dist/*.whl | grep divi/ai/_data/vectors.faiss
          zipinfo dist/*.whl | grep divi/ai/_data/chunks.json
          zipinfo dist/*.whl | grep divi/ai/_data/project_meta.json
