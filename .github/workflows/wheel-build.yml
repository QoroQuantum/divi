name: Wheel Build (dry-run)

on: workflow_dispatch

permissions:
  contents: read

jobs:
  wheel-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry==2.2.1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --only=main,ai --no-interaction --no-ansi

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-jina-v2-base-code

      - name: Build divi-ai search index
        run: poetry run python -m divi.ai build --batch-size 8

      - name: Build wheel
        run: poetry build

      - name: Verify index in wheel
        run: |
          zipinfo dist/*.whl | grep divi/ai/_data/vectors.faiss
          zipinfo dist/*.whl | grep divi/ai/_data/chunks.json
          zipinfo dist/*.whl | grep divi/ai/_data/project_meta.json
