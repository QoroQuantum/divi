# .readthedocs.yaml
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - libenchant-2-dev
  jobs:
    post_install:
      - pip install uv
      - VIRTUAL_ENV=$READTHEDOCS_VIRTUALENV_PATH uv sync --no-default-groups --group docs --no-install-project

sphinx:
  configuration: docs/source/conf.py

formats: []
